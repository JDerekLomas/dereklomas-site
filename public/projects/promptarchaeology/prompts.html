<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Logs - Prompt Archaeology</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #fdfcf9;
            --bg-warm: #f5f0e8;
            --text-primary: #1a1612;
            --text-muted: #666;
            --accent-rust: #9e4a3a;
            --border-light: #e8e4dc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--bg-cream);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Site Header */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(253, 252, 249, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-light);
        }

        .site-nav {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
        }

        .site-logo:hover { color: var(--accent-rust); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
        }

        .nav-links a {
            color: #444;
            text-decoration: none;
        }

        .nav-links a:hover { color: var(--accent-rust); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }

        /* Page Header */
        .page-header {
            text-align: center;
            padding: 60px 24px 40px;
            border-bottom: 1px solid var(--border-light);
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .page-header .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-rust);
        }

        .page-header nav {
            margin-top: 1.5rem;
        }

        .page-header nav a {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 1rem;
        }

        .page-header nav a:hover { color: var(--accent-rust); }

        /* Main */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .intro {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 40px;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Project tabs */
        .project-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .project-tab {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            padding: 8px 16px;
            background: var(--bg-warm);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-tab:hover {
            border-color: var(--accent-rust);
        }

        .project-tab.active {
            background: var(--accent-rust);
            color: white;
            border-color: var(--accent-rust);
        }

        /* Prompt list */
        .prompt-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .prompt-item {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 16px 20px;
            position: relative;
        }

        .prompt-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-rust);
            border-radius: 3px 0 0 3px;
        }

        .prompt-time {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .prompt-content {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .prompt-count {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-rust);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="/" class="site-logo">Derek Lomas</a>
            <ul class="nav-links">
                <li><a href="/projects">Projects</a></li>
                <li><a href="/research">Research</a></li>
                <li><a href="/writing">Writing</a></li>
                <li><a href="/lab">Lab</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>

    <header class="page-header">
        <h1>Prompt Logs</h1>
        <p class="subtitle">Raw prompts from selected projects</p>
        <nav>
            <a href="/projects/promptarchaeology/">← Data</a>
            <a href="/projects/promptarchaeology/field-notes.html">Field Notes</a>
            <a href="/projects/promptarchaeology/grimoire.html">Grimoire</a>
        </nav>
    </header>

    <main>
        <p class="intro">The actual prompts used to build six projects. Unedited, unfiltered—just the raw conversation.</p>

        <div class="project-tabs" id="tabs"></div>
        <p class="prompt-count" id="count"></p>
        <div class="prompt-list" id="prompts"></div>
    </main>

    <footer>
        <p><a href="/projects/promptarchaeology/">← Back to Prompt Archaeology</a></p>
        <p style="margin-top: 1rem;">Derek Lomas · Feb 2026</p>
    </footer>

    <script src="/projects/promptarchaeology/data/project-prompts.js"></script>
    <script>
        const projectNames = {
            'xwhysi': 'XWHYSI',
            'designtherapy': 'Design Therapy',
            'seliger': 'Jake Seliger Bot',
            'fractalbreeder': 'Fractal Breeder',
            'morniplus': 'Morni+',
            'solidsleep': 'Solid Sleep'
        };

        let activeProject = 'xwhysi';

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function renderTabs() {
            const tabs = document.getElementById('tabs');
            tabs.innerHTML = Object.keys(PROJECT_PROMPTS).map(key =>
                `<button class="project-tab ${key === activeProject ? 'active' : ''}" data-project="${key}">
                    ${projectNames[key] || key}
                </button>`
            ).join('');

            tabs.querySelectorAll('.project-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeProject = btn.dataset.project;
                    renderTabs();
                    renderPrompts();
                });
            });
        }

        function renderPrompts() {
            const data = PROJECT_PROMPTS[activeProject];
            const countEl = document.getElementById('count');
            if (data.url) {
                countEl.innerHTML = `<a href="${data.url}" target="_blank" style="color: var(--accent-rust); text-decoration: none;">${data.url}</a> · ${data.count} prompts`;
            } else {
                countEl.textContent = `${data.count} prompts`;
            }

            const list = document.getElementById('prompts');
            list.innerHTML = data.prompts.map(p => `
                <div class="prompt-item">
                    <div class="prompt-time">${formatTime(p.timestamp)}</div>
                    <div class="prompt-content">${escapeHtml(p.content)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        renderTabs();
        renderPrompts();
    </script>
</body>
</html>
